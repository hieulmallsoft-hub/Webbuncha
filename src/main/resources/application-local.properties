spring.datasource.url=jdbc:h2:file:./.local-db/buncha;MODE=PostgreSQL;DATABASE_TO_UPPER=false;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

jwt.secret=localjwtsecretkeyHS256localjwtsecretkeyHS256localjwtsecret

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.cors.allowed-origin-patterns=http://localhost:*,http://127.0.0.1:*,http://localhost,http://127.0.0.1
app.admin.enabled=true
app.admin.email=admin@bunchachinhhuong.vn
app.admin.password=Admin@12345
app.admin.name=Bun Cha Chinh Huong Admin
app.demo-menu.enabled=true
