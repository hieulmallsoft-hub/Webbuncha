spring.datasource.url=jdbc:h2:file:./.local-db/buncha;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;DATABASE_TO_UPPER=false
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

jwt.secret=${JWT_SECRET:local-development-jwt-secret-change-me-32-bytes-minimum}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

# Local cache uses in-memory cache to avoid Redis dependency during development.
spring.cache.type=simple

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.cors.allowed-origin-patterns=http://localhost:*,http://127.0.0.1:*,http://localhost,http://127.0.0.1
app.admin.enabled=true
app.admin.email=${APP_ADMIN_EMAIL:admin@bunchachinhhuong.vn}
app.admin.password=${APP_ADMIN_PASSWORD:}
app.admin.name=${APP_ADMIN_NAME:Bun Cha Chinh Huong Admin}
app.demo-menu.enabled=true
app.push.firebase.enabled=false
app.push.firebase.service-account-location=
app.push.firebase.project-id=
app.push.firebase.api-key=
app.push.firebase.auth-domain=
app.push.firebase.storage-bucket=
app.push.firebase.messaging-sender-id=
app.push.firebase.app-id=
app.push.firebase.vapid-key=
app.push.firebase.admin-orders-path=/admin/orders

# VNPay sandbox: you MUST use your own sandbox TMN code + hash secret from VNPay portal.
# If you keep placeholder/empty values, VNPay will respond with code=70 (Sai chữ ký).
app.payment.vnpay.enabled=true
app.payment.vnpay.payment-url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
app.payment.vnpay.return-url=http://localhost:5173/payment-result
app.payment.vnpay.ipn-url=http://localhost:8080/payments/vnpay/ipn

# Local-only secrets (not committed, not packaged into the jar)
spring.config.import=optional:file:./.local/application-local-private.properties
