spring.application.name=hoidanit-spring-rest-with-ai
# server.port=9090

# ==============================
# DATABASE CONNECTION
# ==============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver


# ==============================
# MESSAGES
# ==============================
spring.messages.basename=messages
spring.messages.encoding=UTF-8

# ==============================
# JWT
# ==============================
jwt.secret=${JWT_SECRET}
# 1 day
jwt.expiration=86400000
# 7 days
jwt.refreshExpiration=604800000

# ==============================
# JPA
# ==============================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.generate-ddl=false
spring.sql.init.mode=never
spring.sql.init.separator=__END__
spring.jpa.defer-datasource-initialization=false

# ==============================
# DEPLOY DEFAULTS
# ==============================
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGINS:}
app.admin.enabled=${APP_ADMIN_ENABLED:false}
app.admin.email=${APP_ADMIN_EMAIL:}
app.admin.password=${APP_ADMIN_PASSWORD:}
app.admin.name=${APP_ADMIN_NAME:Admin}
