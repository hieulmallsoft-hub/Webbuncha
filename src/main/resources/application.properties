spring.application.name=hoidanit-spring-rest-with-ai
# server.port=9090

# ==============================
# DATABASE CONNECTION
# ==============================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/Hr_Managerment}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=org.postgresql.Driver


# ==============================
# MESSAGES
# ==============================
spring.messages.basename=messages
spring.messages.encoding=UTF-8

# ==============================
# JWT
# ==============================
jwt.secret=${JWT_SECRET:hoidanitjwtsecretkeyHS256hoidanitjwtsecretkeyHS256hoidanitjwt}
# 1 day
jwt.expiration=86400000
# 7 days
jwt.refreshExpiration=604800000

# ==============================
# JPA (DEV DEFAULT)
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.generate-ddl=true
spring.jpa.properties.hibernate.hbm2ddl.auto=update
spring.sql.init.mode=always
spring.sql.init.separator=__END__
spring.jpa.defer-datasource-initialization=false

# ==============================
# DEFAULT ADMIN (nen bat thong qua env khi deploy)
# ==============================
app.admin.enabled=true
app.admin.email=admin@bunchachinhhuong.vn
app.admin.password=Admin@12345
app.admin.name=Bun Cha Chinh Huong Admin
