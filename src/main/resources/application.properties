spring.application.name=hoidanit-spring-rest-with-ai
# server.port=9090

# ==============================
# DATABASE CONNECTION
# ==============================
# NOTE:
# - spring.datasource.url is the JDBC URL (contains host/port/database name)
# - spring.datasource.driver-class-name is the driver class, NOT the URL
# Example local Postgres URL: jdbc:postgresql://localhost:5432/shopbuncha
# Prefer environment variables for secrets / per-environment config.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/shopbuncha}
spring.datasource.username=${DB_USERNAME:postgres}
# Don't ship default DB passwords in source control. Provide via env var / secret manager.
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=org.postgresql.Driver



# ==============================
# MESSAGES
# ==============================
spring.messages.basename=messages
spring.messages.encoding=UTF-8

# ==============================
# JWT
# ==============================
jwt.secret=${JWT_SECRET}
# 1 day
jwt.expiration=86400000
# 7 days
jwt.refreshExpiration=604800000

# ==============================
# JPA
# ==============================
spring.jpa.hibernate.ddl-auto=update

spring.jpa.generate-ddl=false
spring.sql.init.mode=never
spring.sql.init.separator=__END__
spring.jpa.defer-datasource-initialization=false
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
spring.cache.type=${CACHE_TYPE:simple}
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=${REDIS_TIMEOUT:2s}

# ==============================
# DEPLOY DEFAULTS
# ==============================
app.cache.redis.ttl=${CACHE_REDIS_TTL:10m}
app.upload.dir=${APP_UPLOAD_DIR:./uploads}
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGINS: }
app.admin.enabled=${APP_ADMIN_ENABLED:false}
app.admin.email=${APP_ADMIN_EMAIL:}
app.admin.password=${APP_ADMIN_PASSWORD:}
app.admin.name=${APP_ADMIN_NAME:Admin}
app.push.firebase.enabled=${APP_PUSH_FIREBASE_ENABLED:false}
app.push.firebase.service-account-location=${APP_PUSH_FIREBASE_SERVICE_ACCOUNT_LOCATION:}
app.push.firebase.project-id=${APP_PUSH_FIREBASE_PROJECT_ID:}
app.push.firebase.api-key=${APP_PUSH_FIREBASE_API_KEY:}
app.push.firebase.auth-domain=${APP_PUSH_FIREBASE_AUTH_DOMAIN:}
app.push.firebase.storage-bucket=${APP_PUSH_FIREBASE_STORAGE_BUCKET:}
app.push.firebase.messaging-sender-id=${APP_PUSH_FIREBASE_MESSAGING_SENDER_ID:}
app.push.firebase.app-id=${APP_PUSH_FIREBASE_APP_ID:}
app.push.firebase.vapid-key=${APP_PUSH_FIREBASE_VAPID_KEY:}
app.push.firebase.admin-orders-path=${APP_PUSH_FIREBASE_ADMIN_ORDERS_PATH:/admin/orders}

# ==============================
# VNPAY
# ==============================
app.payment.vnpay.enabled=${VNPAY_ENABLED:false}
# VNPay credentials: provide via environment variables (or ./ .local / secret manager).
# Do not commit real secrets into source control.
app.payment.vnpay.tmn-code=${VNPAY_TMN_CODE:}
app.payment.vnpay.hash-secret=${VNPAY_HASH_SECRET:}
app.payment.vnpay.payment-url=${VNPAY_PAYMENT_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
app.payment.vnpay.return-url=${VNPAY_RETURN_URL:http://localhost:5173/payment-result}
app.payment.vnpay.ipn-url=${VNPAY_IPN_URL:http://localhost:8080/payments/vnpay/ipn}
app.payment.vnpay.locale=${VNPAY_LOCALE:vn}
app.payment.vnpay.version=${VNPAY_VERSION:2.1.0}
app.payment.vnpay.order-type=${VNPAY_ORDER_TYPE:other}
app.payment.vnpay.expire-minutes=${VNPAY_EXPIRE_MINUTES:15}
