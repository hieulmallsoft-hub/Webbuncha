name: CI

on:
  push:
  pull_request:

jobs:
  build_test_and_docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Run backend tests
        run: |
          chmod +x mvnw
          ./mvnw -B test

      - name: Build Docker image
        run: |
          docker build -t buncha-app:ci .
